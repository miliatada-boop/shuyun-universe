<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找到你真正适合的产品模式</title>
  <link rel="preconnect" href="https://fonts.loli.net">
  <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
  <link href="https://fonts.loli.net/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

<div id="prog"><div id="prog-fill"></div></div>

<!-- ══ 首屏 ══ -->
<div class="screen active" id="s-intro">
  <div class="intro-inner">
    <div class="intro-brand">FOUNDER INTELLIGENCE TOOL</div>
    <h1 class="intro-title">
      找到你真正<br>适合的产品模式
      <em>Find Your Natural Business Model</em>
    </h1>
    <div class="intro-rule"></div>
    <p class="intro-desc">
      这不是性格测试。<br>
      这是一套诊断工具——<br>
      用来找到你最自然、最可持续的商业结构。
    </p>
    <div class="intro-meta">
      <span>约 4 分钟完成</span>
      <span>25 道选择题</span>
      <span>完整商业报告</span>
    </div>
    <button class="btn" id="startBtn">开始诊断 →</button>
  </div>
</div>

<!-- ══ 题目 ══ -->
<div class="screen" id="s-question">
  <div class="q-wrap">
    <div class="q-meta">
      <span class="q-idx" id="qIdx">01 / 25</span>
      <div class="q-rule"></div>
      <span class="q-cat" id="qCat">Founder行为诊断</span>
    </div>
    <div class="q-text" id="qText"></div>
    <p class="q-hint" id="qHint">可选择 1–2 个最符合你的选项</p>
    <div class="opts" id="opts"></div>
    <div class="q-nav">
      <button class="btn-back" id="btnBack">← 上一题</button>
      <button class="btn-next" id="btnNext">继续 →</button>
    </div>
  </div>
</div>

<!-- ══ 计算中 ══ -->
<div class="screen" id="s-calc">
  <div class="calc-inner">
    <div class="calc-lbl">正在分析</div>
    <div class="calc-txt" id="calcMsg">分析你的行为偏好…</div>
    <div class="calc-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- ══ 结果 ══ -->
<div class="screen" id="s-result">
  <div class="r-wrap" id="rWrap"></div>
</div>

<script src="./script.js"></script>
</body>
</html>
